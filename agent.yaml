name: primordial-orchestrator-node
display_name: Primordial Orchestrator (Node.js)
version: 0.1.0
description: >
  Dynamic orchestrator that discovers and delegates to any agent on the
  Primordial AgentStore. Uses primordial search to find the best agent for
  each task, then spawns it as a sub-agent. No hardcoded agent URLs — it
  adapts to whatever agents are available on the store.
  Node.js port — faster sandbox setup via npm install.

category: general
tags:
  - orchestrator
  - delegation
  - multi-agent
  - discovery

author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node src/agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  resources:
    max_memory: 2GB
    max_cpu: 2
    max_time: "30m"

keys:
  - provider: anthropic
    domain: api.anthropic.com
    auth_style: x-api-key
    env_var: ANTHROPIC_API_KEY
    required: true

permissions:
  network:
    - domain: api.anthropic.com
      reason: LLM inference for orchestration decisions
  filesystem:
    workspace: readwrite
  delegation:
    enabled: true
